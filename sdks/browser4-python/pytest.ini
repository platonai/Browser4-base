[pytest]
# Pytest configuration for Browser4 Python SDK tests

# Test markers
markers =
    integration: Integration tests that require real servers (deselect with '-m "not integration"')
    unit: Unit tests with mocked dependencies (default)
    slow: Tests that take longer than 10 seconds

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --verbose
    --strict-markers
    --tb=short
    -ra

# Timeout configuration (requires pytest-timeout)
# Integration tests can take longer due to server startup
timeout = 300
timeout_method = thread

# Test paths
testpaths = tests

# Ignore patterns
norecursedirs = .git .tox build dist *.egg

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
