name: Kotlin SDK Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'sdks/kotlin-sdk/**'
      - 'pulsar-rest/**'
      - '.github/workflows/kotlin-sdk-test.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'sdks/kotlin-sdk/**'
      - 'pulsar-rest/**'
  schedule:
    # 每日夜间构建
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: |
          cd sdks/kotlin-sdk
          # Run fast unit tests only (test-strategy.md)
          mvn test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: sdks/kotlin-sdk/target/surefire-reports/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Build project
        run: mvn install -DskipTests -pl pulsar-core,pulsar-rest,pulsar-tests-common -am

      - name: Run integration tests
        run: |
          cd sdks/kotlin-sdk
          # Run SDK integration tests (test-strategy.md: SDK tag)
          mvn test -DrunSDKTests=true -Pintegration-test
        env:
          DISPLAY: :99

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: sdks/kotlin-sdk/target/surefire-reports/

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            sdks/kotlin-sdk/target/*.log
            ~/.browser4/logs/

  publish-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/*.xml
