name: Kotlin SDK Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'sdks/browser4-kotlin/**'
      - 'sdks/kotlin-sdk-tests/**'
      - 'pulsar-rest/**'
      - '.github/workflows/kotlin-sdk-test.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'sdks/browser4-kotlin/**'
      - 'sdks/kotlin-sdk-tests/**'
      - 'pulsar-rest/**'
  # Manual trigger only (removed scheduled run to avoid duplication with push/PR)
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: |
          cd sdks/browser4-kotlin
          # Run fast unit tests only (test-strategy.md)
          mvn test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: sdks/browser4-kotlin/target/surefire-reports/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Verify Chrome install
        run: |
          command -v google-chrome
          google-chrome --version

      - name: Diagnose Chrome install failure
        if: failure()
        run: |
          echo "Chrome install/verify failed; collecting diagnostics"
          sudo apt-cache policy google-chrome-stable || true
          dpkg -l | grep -i chrome || true
          sudo tail -n 200 /var/log/apt/term.log || true
          exit 1

      - name: Build project
        run: ./mvnw install -DskipTests -Pall-modules

      - name: Run integration tests
        run: |
          # Run SDK integration tests (test-strategy.md: SDK tag)
          # ./mvnw -pl sdks/kotlin-sdk-tests test -DrunSDKTests=true -Pintegration-test
          ./mvnw -pl sdks/kotlin-sdk-tests test -DrunSDKTests=true -Psdk -Pintegration-test -D"test=ai.platon.pulsar.sdk.integration.WebDriverKeyboardAndFocusTest"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: sdks/kotlin-sdk-tests/target/surefire-reports/

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            sdks/kotlin-sdk-tests/target/*.log
            ~/.browser4/logs/

  publish-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            **/*.xml
