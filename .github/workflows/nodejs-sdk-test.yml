name: NodeJS SDK Tests

on:
  pull_request:
    paths:
      - 'sdks/browser4-nodejs/**'
      - '.github/workflows/nodejs-sdk-test.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'sdks/browser4-nodejs/**'
      - '.github/workflows/nodejs-sdk-test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [16, 18, 20]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: sdks/browser4-nodejs/package-lock.json
      
      - name: Install dependencies
        working-directory: sdks/browser4-nodejs
        run: npm ci
      
      - name: Run lint
        working-directory: sdks/browser4-nodejs
        run: npm run lint
      
      - name: Run tests
        working-directory: sdks/browser4-nodejs
        run: npm test
      
      - name: Build
        working-directory: sdks/browser4-nodejs
        run: npm run build
      
      - name: Verify build
        working-directory: sdks/browser4-nodejs
        run: npm run verify:build
      
      - name: Test package creation
        working-directory: sdks/browser4-nodejs
        run: npm pack --dry-run
      
      - name: Upload coverage (ubuntu-latest, node 18 only)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 18
        uses: codecov/codecov-action@v3
        with:
          directory: sdks/browser4-nodejs/coverage
          flags: nodejs-sdk
          name: nodejs-sdk-coverage
  
  test-installation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies and build
        working-directory: sdks/browser4-nodejs
        run: |
          npm ci
          npm run build
      
      - name: Create package
        working-directory: sdks/browser4-nodejs
        run: npm pack
      
      - name: Test installation
        run: |
          cd /tmp
          mkdir test-install
          cd test-install
          npm init -y
          npm install $GITHUB_WORKSPACE/sdks/browser4-nodejs/*.tgz
          
          # Create test file
          cat > test.js << 'EOF'
          const sdk = require('@platonai/browser4-sdk');
          const required = ['PulsarClient', 'Browser4Driver', 'PulsarSession', 'AgenticSession', 'WebDriver'];
          let allPresent = true;
          required.forEach(name => {
            if (!sdk[name]) {
              console.error(`❌ ${name} is missing`);
              allPresent = false;
            } else {
              console.log(`✅ ${name} is available`);
            }
          });
          if (!allPresent) process.exit(1);
          console.log('\n✅ Installation test passed!');
          EOF
          
          node test.js
