name: Documentation Link Check

on:
  # Run on pull requests that modify documentation
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - 'devdocs/**'
  
  # Run on push to main branches
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - '*.md'
      - 'devdocs/**'
  
  # Allow manual trigger
  workflow_dispatch:

  # Run weekly to catch external link rot
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight

jobs:
  check-links:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Check documentation links
        id: link_check
        continue-on-error: true
        run: |
          ./bin/quality/check-links.sh
      
      - name: Check documentation links (skip external)
        if: steps.link_check.outcome == 'failure'
        run: |
          echo "⚠️ Full link check failed. Running internal-only check..."
          ./bin/quality/check-links.sh --skip-external
      
      - name: Report results
        if: always()
        run: |
          if [ "${{ steps.link_check.outcome }}" == "success" ]; then
            echo "✅ All documentation links are valid!"
          else
            echo "❌ Some links are broken. Please check the logs above."
            echo "💡 Tip: Run './bin/quality/check-links.sh' locally to see details."
          fi
