name: Publish NodeJS SDK

on:
  push:
    tags:
      - 'sdk-nodejs-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string
      npm_tag:
        description: 'NPM dist-tag (latest, beta, next)'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - beta
          - next
          - rc

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            NPM_TAG="${{ github.event.inputs.npm_tag }}"
          else
            # Extract from tag: sdk-nodejs-v0.1.0 -> 0.1.0
            TAG=${GITHUB_REF#refs/tags/sdk-nodejs-v}
            VERSION=$TAG
            # Determine npm tag based on version
            if [[ "$VERSION" == *"-beta"* ]]; then
              NPM_TAG="beta"
            elif [[ "$VERSION" == *"-rc"* ]]; then
              NPM_TAG="rc"
            elif [[ "$VERSION" == *"-next"* ]]; then
              NPM_TAG="next"
            else
              NPM_TAG="latest"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "npm_tag=$NPM_TAG" >> $GITHUB_OUTPUT
          echo "📦 Publishing version: $VERSION with tag: $NPM_TAG"
      
      - name: Install dependencies
        working-directory: sdks/browser4-nodejs
        run: npm ci
      
      - name: Run lint
        working-directory: sdks/browser4-nodejs
        run: npm run lint
      
      - name: Run tests
        working-directory: sdks/browser4-nodejs
        run: npm test
      
      - name: Build
        working-directory: sdks/browser4-nodejs
        run: npm run build
      
      - name: Verify build
        working-directory: sdks/browser4-nodejs
        run: npm run verify:build
      
      - name: Update version in package.json
        working-directory: sdks/browser4-nodejs
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
      
      - name: Check package contents
        working-directory: sdks/browser4-nodejs
        run: npm pack --dry-run
      
      - name: Publish to npm
        working-directory: sdks/browser4-nodejs
        run: |
          npm publish --access public --tag ${{ steps.version.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          name: NodeJS SDK ${{ steps.version.outputs.version }}
          body: |
            # Browser4 NodeJS SDK ${{ steps.version.outputs.version }}
            
            ## Installation
            
            ```bash
            npm install @platonai/browser4-sdk@${{ steps.version.outputs.version }}
            ```
            
            ## Changes
            
            See [CHANGELOG.md](https://github.com/platonai/Browser4/blob/main/sdks/browser4-nodejs/CHANGELOG.md) for details.
            
            ## Documentation
            
            - [README](https://github.com/platonai/Browser4/tree/main/sdks/browser4-nodejs/README.md)
            - [Installation Guide](https://github.com/platonai/Browser4/tree/main/sdks/browser4-nodejs/INSTALLATION.md)
            - [Quick Reference](https://github.com/platonai/Browser4/tree/main/sdks/browser4-nodejs/QUICKREF.md)
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Post-publish verification
        run: |
          echo "⏳ Waiting for npm registry to update..."
          sleep 30
          
          echo "✅ Published successfully!"
          echo "📦 Package: @platonai/browser4-sdk@${{ steps.version.outputs.version }}"
          echo "🏷️  Tag: ${{ steps.version.outputs.npm_tag }}"
          echo "🔗 View on npm: https://www.npmjs.com/package/@platonai/browser4-sdk/v/${{ steps.version.outputs.version }}"
