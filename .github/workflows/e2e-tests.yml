name: E2E Tests

on:
  # Allow manual workflow runs only (test-strategy.md: MustRunExplicitly)
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean

env:
  IMAGE_NAME: browser4
  NETWORK_NAME: 'browser4_backend'
  CONTAINER_NAME: 'browser4-e2e-test'
  DOCKER_COMPOSE_FILE: './docker-compose.yml'
  DEPENDENCY_SERVICES: 'mongodb'
  MONGODB_CONTAINER: 'mongodb'
  MONGODB_PORT: '27017'
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx3g -XX:+UseG1GC'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          java_version: ${{ env.JAVA_VERSION }}

      - name: Verify Dependencies
        id: deps
        uses: ./.github/actions/verify-dependencies
        with:
          network_name: ${{ env.NETWORK_NAME }}
          compose_file: ${{ env.DOCKER_COMPOSE_FILE }}
          services_to_start: ${{ env.DEPENDENCY_SERVICES }}
          mongodb_container: ${{ env.MONGODB_CONTAINER }}
          mongodb_port: ${{ env.MONGODB_PORT }}
          startup_timeout: '120'
          verify_network_connectivity: 'true'

      - name: Maven Build
        id: build-maven
        uses: ./.github/actions/maven-build
        with:
          skip_tests: 'true'
          timeout_minutes: '15'

      - name: Run E2E Tests
        id: run-e2e-tests
        uses: ./.github/actions/run-tests
        with:
          maven_profiles: 'all-modules,pulsar-tests,e2e-tests'
          # Run E2E tests only (test-strategy.md: Heavy, RequiresBrowser, RequiresAI)
          excluded_groups: 'MustRunExplicitly'
          run_pulsar_tests: 'true'
          timeout_minutes: '90'

      - name: Check Test Status
        if: always()
        run: |
          if [ "${{ steps.run-e2e-tests.outputs.test_status }}" != "success" ]; then
            echo "❌ E2E tests failed with status: ${{ steps.run-e2e-tests.outputs.test_status }}"
            echo "📊 Test Results:"
            echo "  - Total Tests: ${{ steps.run-e2e-tests.outputs.test_count }}"
            echo "  - Failed Tests: ${{ steps.run-e2e-tests.outputs.failed_count }}"
            echo "  - Passed Tests: ${{ steps.run-e2e-tests.outputs.passed_count }}"
            echo "  - Skipped Tests: ${{ steps.run-e2e-tests.outputs.skipped_count }}"
            exit 1
          else
            echo "✅ All E2E tests passed successfully"
            echo "📊 Test Results: ${{ steps.run-e2e-tests.outputs.passed_count }} tests passed"
          fi

      - name: Cleanup Docker system to free space
        if: always()
        run: |
          docker system prune -af
          docker volume prune -f
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo df -h

      - name: Build Docker Image
        id: build
        if: success()
        uses: ./.github/actions/docker-build
        with:
          image_name: ${{ env.IMAGE_NAME }}
          version: ${{ github.sha }}
          timeout_minutes: '20'

      - name: Start Application
        id: app
        if: success()
        uses: ./.github/actions/start-application
        with:
          image_name: ${{ env.IMAGE_NAME }}
          version: ${{ github.sha }}
          container_name: ${{ env.CONTAINER_NAME }}
          network_name: ${{ env.NETWORK_NAME }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          proxy_rotation_url: ${{ secrets.PROXY_ROTATION_URL }}

      - name: Health Check
        id: health
        if: success()
        uses: ./.github/actions/health-check
        with:
          service_port: '8182'
          timeout_minutes: '5'
          container_name: ${{ env.CONTAINER_NAME }}

      - name: Run End to End Tests
        id: end-to-end-tests
        if: success()
        shell: bash
        run: |
          echo "::group::🧪 End to End Tests"

          if [ -f "./bin/tests/run-e2e-tests.sh" ]; then
            echo "✅ Found E2E test script"
            chmod +x ./bin/tests/run-e2e-tests.sh

            echo "🚀 Running E2E tests..."
            date
            echo "Application URL: http://localhost:8182"
            echo "Network: ${{ env.NETWORK_NAME }}"
            echo "Container: ${{ env.CONTAINER_NAME }}"

            if timeout 1200 ./bin/tests/run-e2e-tests.sh; then
              echo "✅ E2E tests passed"
              echo "e2e_status=success" >> $GITHUB_OUTPUT
            else
              echo "❌ E2E tests failed"
              echo "e2e_status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            echo "⚠️ E2E test script not found: ./bin/tests/run-e2e-tests.sh"
            echo "Skipping E2E tests..."
            echo "e2e_status=skipped" >> $GITHUB_OUTPUT
          fi

          echo "::endgroup::"

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports-${{ github.run_id }}
          path: |
            **/target/surefire-reports/**
            ~/.browser4/logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Pipeline Summary
        if: always()
        shell: bash
        run: |
          echo "::group::📊 Pipeline Summary"

          echo "🎯 Pipeline Results:"
          echo "  - Setup: ${{ steps.setup.outcome }}"
          echo "  - Dependencies: ${{ steps.deps.outcome }}"
          echo "  - Maven Build: ${{ steps.build-maven.outcome }}"
          echo "  - E2E Tests: ${{ steps.run-e2e-tests.outcome }}"
          echo "  - Docker Build: ${{ steps.build.outcome }}"
          echo "  - Application: ${{ steps.app.outcome }}"
          echo "  - Health Check: ${{ steps.health.outcome }}"
          echo "  - End-to-End Tests: ${{ steps.end-to-end-tests.outcome || 'skipped' }}"

          echo ""
          echo "🌐 Infrastructure:"
          echo "  - Network: ${{ env.NETWORK_NAME }}"
          echo "  - Container: ${{ env.CONTAINER_NAME }}"
          echo "  - Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  - MongoDB: ${{ steps.deps.outputs.mongodb_status }}"

          echo ""
          echo "📅 Completed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "🌟 Commit: ${{ github.sha }}"

          echo "::endgroup::"

      - name: Cleanup Resources
        if: always()
        uses: ./.github/actions/cleanup-resources
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          cleanup_compose: 'true'
          cleanup_volumes: 'true'
          network_name: ${{ env.NETWORK_NAME }}
