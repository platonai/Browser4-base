name: Release Python SDK

on:
  push:
    tags:
      - 'python-sdk-v[0-9]+.[0-9]+.[0-9]+'
      - 'python-sdk-v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (TestPyPI only)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write  # For PyPI trusted publishing

env:
  PYTHON_VERSION: '3.11'
  SDK_DIR: 'sdks/browser4-sdk-python'

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install build tools
        run: |
          uv pip install --system build twine

      - name: Build package
        run: |
          cd ${{ env.SDK_DIR }}
          python -m build

      - name: Check package
        run: |
          cd ${{ env.SDK_DIR }}
          twine check dist/*

      - name: List build artifacts
        run: |
          cd ${{ env.SDK_DIR }}
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: ${{ env.SDK_DIR }}/dist/
          if-no-files-found: error

  test-package:
    name: Test Package Installation
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Test wheel installation (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m pip install dist/*.whl
          python -c "import browser4; print(f'✓ browser4-sdk {browser4.__version__}')"

      - name: Test wheel installation (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1
          python -m pip install $wheel.FullName
          python -c "import browser4; print(f'✓ browser4-sdk {browser4.__version__}')"

      - name: Test basic imports
        run: |
          python -c "from browser4 import PulsarClient, AgenticSession, WebDriver, Browser4Driver"
          python -c "from browser4 import WebPage, NormURL, AgentRunResult"
          echo "✓ All imports successful"

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build, test-package]
    runs-on: ubuntu-latest
    if: github.event.inputs.dry_run == 'true'

    environment:
      name: testpypi
      url: https://test.pypi.org/project/browser4-sdk/

    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
          print-hash: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build, test-package]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/python-sdk-v') && github.event.inputs.dry_run != 'true'

    environment:
      name: pypi
      url: https://pypi.org/project/browser4-sdk/

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true

  create-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/python-sdk-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Check if CHANGELOG.md exists
        id: changelog
        run: |
          if [ -f "${{ env.SDK_DIR }}/CHANGELOG.md" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ env.SDK_DIR }}

          # Prepare release notes
          if [ "${{ steps.changelog.outputs.exists }}" = "true" ]; then
            NOTES_FILE="CHANGELOG.md"
          else
            echo "Release browser4-sdk-python v${{ steps.version.outputs.version }}" > /tmp/release-notes.md
            NOTES_FILE="/tmp/release-notes.md"
          fi

          # Create release
          gh release create ${{ github.ref_name }} \
            --title "browser4-sdk-python v${{ steps.version.outputs.version }}" \
            --notes-file "$NOTES_FILE" \
            ../../dist/*

      - name: Release Summary
        run: |
          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "- [PyPI](https://pypi.org/project/browser4-sdk/${{ steps.version.outputs.version }}/)" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Installation" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "pip install browser4-sdk==${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
