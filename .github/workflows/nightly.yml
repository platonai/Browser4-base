name: Nightly Build

on:
  schedule:
    # Runs at 00:00 UTC every day
    # This is a comprehensive nightly build including:
    # - All unit tests (Fast + Slow)
    # - Integration tests
    # - Docker image building
    # - Python SDK tests
    # Note: E2E tests run separately in cli-e2e-tests.yml (manual only)
    - cron: '0 0 * * *'
  # Allow manual workflow runs
  workflow_dispatch:

env:
  IMAGE_NAME: browser4
  NETWORK_NAME: 'browser4_backend'
  CONTAINER_NAME: 'browser4-test'
  DOCKER_COMPOSE_FILE: './docker-compose.yml'
  DEPENDENCY_SERVICES: 'mongodb'
  MONGODB_CONTAINER: 'mongodb'
  MONGODB_PORT: '27017'
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx3g -XX:+UseG1GC'

jobs:
  nightly-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup
        if: success()
        uses: ./.github/actions/setup-environment
        with:
          java_version: ${{ env.JAVA_VERSION }}

      - name: Verify Dependencies
        id: deps
        if: success()
        uses: ./.github/actions/verify-dependencies
        with:
          network_name: ${{ env.NETWORK_NAME }}
          compose_file: ${{ env.DOCKER_COMPOSE_FILE }}
          services_to_start: ${{ env.DEPENDENCY_SERVICES }}
          mongodb_container: ${{ env.MONGODB_CONTAINER }}
          mongodb_port: ${{ env.MONGODB_PORT }}
          startup_timeout: '120'
          verify_network_connectivity: 'true'

      - name: Maven Build
        id: build-maven
        if: success()
        uses: ./.github/actions/maven-build
        with:
          skip_tests: 'true'
          timeout_minutes: '15'

      - name: Run Comprehensive Tests
        id: run-tests
        uses: ./.github/actions/run-tests
        with:
          # Nightly: All unit tests (Fast + Slow) + Integration tests
          maven_profiles: 'all-modules,pulsar-tests,integration-tests'
          # Include: Unit (Fast + Slow) + Integration
          # Exclude: E2E (manual only), SDK (separate workflows), ManualOnly
          excluded_groups: 'E2E,SDK,ManualOnly,E2ETest,RequiresBrowser,RequiresAI'
          run_pulsar_tests: 'true'
          timeout_minutes: '60'

      - name: Check Test Status
        if: always()
        run: |
          if [ "${{ steps.run-tests.outputs.test_status }}" != "success" ]; then
            echo "❌ Tests failed with status: ${{ steps.run-tests.outputs.test_status }}"
            echo "📊 Test Results:"
            echo "  - Total Tests: ${{ steps.run-tests.outputs.test_count }}"
            echo "  - Failed Tests: ${{ steps.run-tests.outputs.failed_count }}"
            echo "  - Passed Tests: ${{ steps.run-tests.outputs.passed_count }}"
            echo "  - Skipped Tests: ${{ steps.run-tests.outputs.skipped_count }}"
            exit 1
          else
            echo "✅ All tests passed successfully"
            echo "📊 Test Results: ${{ steps.run-tests.outputs.passed_count }} tests passed"
          fi










      #### Run browser4-cli E2E Tests ####
      ## TODO: run browser4-cli E2E Tests against the docker containerized Browser4 server to validate real-world usage
      ## and catch any potential issues with the Docker deployment. This will help ensure that the CLI can successfully
      ## interact with the server in a production-like environment.


      - name: Setup Rust Toolchain
        id: rust-setup
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/browser4-cli

      - name: Run browser4-cli E2E Tests
        id: e2e-cli
        timeout-minutes: 15
        shell: bash
        run: |
          echo "::group::🧪 browser4-cli E2E Tests"

          # Ensure Chrome is available (required by the Browser4 server under test)
          if ! command -v google-chrome-stable &>/dev/null && ! command -v google-chrome &>/dev/null; then
            echo "Installing Google Chrome..."
            sudo apt-get update -qq
            sudo apt-get install -y google-chrome-stable
          fi
          echo "🔧 Chrome: $(google-chrome-stable --version 2>/dev/null || google-chrome --version 2>/dev/null || echo 'not found')"

          echo "Working directory: $(pwd)"
          ls
          ROOT_DIR=$(git rev-parse --show-toplevel)

          JAR_PATH="$ROOT_DIR/browser4/browser4-agents/target/Browser4.jar"
          if [ ! -f "$JAR_PATH" ]; then
            echo "❌ Browser4 jar not found at $JAR_PATH"
            exit 1
          fi
          echo "✅ Browser4 jar: $JAR_PATH"

          # Run the CLI tests
          echo "Running browser4-cli E2E tests..."
          echo "Working directory: $(pwd)"
          cd sdks/browser4-cli
          BROWSER4_CLI_E2E=true cargo test --test e2e -- --test-threads=1 --nocapture
          cd "$ROOT_DIR"

          echo "::endgroup::"









      - name: Cleanup Docker system to free space
        run: |
          docker system prune -af
          docker volume prune -f
          rm -rf ~/.m2/repository  # If you no longer need Maven cache
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo df -h

      - name: Build Docker Image
        id: build
        if: success()
        uses: ./.github/actions/docker-build
        with:
          image_name: ${{ env.IMAGE_NAME }}
          version: ${{ github.sha }}
          timeout_minutes: '20'

      - name: Start Application
        id: app
        if: success()
        uses: ./.github/actions/start-application
        with:
          image_name: ${{ env.IMAGE_NAME }}
          version: ${{ github.sha }}
          container_name: ${{ env.CONTAINER_NAME }}
          network_name: ${{ env.NETWORK_NAME }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          proxy_rotation_url: ${{ secrets.PROXY_ROTATION_URL }}

      - name: Health Check
        id: health
        if: success()
        uses: ./.github/actions/health-check
        with:
          service_port: '8182'
          timeout_minutes: '5'
          container_name: ${{ env.CONTAINER_NAME }}

      - name: Pipeline Summary
        if: always()
        shell: bash
        run: |
          echo "::group::📊 Pipeline Summary"

          echo "🎯 Pipeline Results:"
          echo "  - Setup: ${{ steps.setup.outcome }}"
          echo "  - Dependencies: ${{ steps.deps.outcome }}"
          echo "  - Maven Build: ${{ steps.build-maven.outcome }}"
          echo "  - Unit Tests: ${{ steps.run-tests.outcome || 'skipped' }}"
          echo "  - Docker Build: ${{ steps.build.outcome }}"
          echo "  - Application: ${{ steps.app.outcome }}"
          echo "  - Health Check: ${{ steps.health.outcome }}"
          echo "  - Python SDK Tests: ${{ steps.python-sdk-tests.outcome || 'skipped' }}"

          echo ""
          echo "🌐 Infrastructure:"
          echo "  - Network: ${{ env.NETWORK_NAME }}"
          echo "  - Container: ${{ env.CONTAINER_NAME }}"
          echo "  - Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  - MongoDB: ${{ steps.deps.outputs.mongodb_status }}"
          echo "  - Redis: ${{ steps.deps.outputs.redis_status }}"

          echo ""
          echo "📅 Completed at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "🌟 Commit: ${{ github.sha }}"

          echo "::endgroup::"

      - name: Cleanup Resources
        if: always()
        uses: ./.github/actions/cleanup-resources
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          cleanup_compose: 'true'
          cleanup_volumes: 'true'
          network_name: ${{ env.NETWORK_NAME }}
