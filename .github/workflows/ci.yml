name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-ci.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+-ci.[0-9]+'
  # CI pipeline for tagged releases: Fast unit tests + Docker build + SDK tests
  # Note: Comprehensive tests (including Slow + Integration) run in nightly.yml
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean
      debug_mode:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx3g -XX:+UseG1GC'

jobs:
  ci-build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
      test_results: ${{ steps.tests.outputs.test_status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          java_version: ${{ env.JAVA_VERSION }}

      - name: Maven Build
        id: build
        uses: ./.github/actions/maven-build
        with:
          skip_tests: 'true'
          timeout_minutes: '25'

      - name: Run Fast Unit Tests
        id: tests
        if: ${{ !inputs.skip_tests }}
        uses: ./.github/actions/run-tests
        with:
          excluded_groups: 'SlowTest'
          timeout_minutes: '25'
          report_name: 'ci-test-reports'

  ci-summary:
    runs-on: ubuntu-latest
    needs: ci-build
    if: always()
    permissions: {}

    steps:
      - name: CI Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.ci-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Results | ${{ needs.ci-build.outputs.test_results || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.ci-build.outputs.image_tag || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
