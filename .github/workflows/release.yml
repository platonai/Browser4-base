name: Release

on:
  push:
    tags:
      # GitHub Actions uses glob patterns here, not regex.
      - 'v*.*.*'
      - '!v*.*.*-*'
      - 'v*.*.*-rc.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0, v1.0.0-rc.1)'
        required: true
        type: string
      skip_tests:
        description: 'Skip tests during build'
        required: false
        default: false
        type: boolean

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write  # For artifact attestation

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx3g -XX:+UseG1GC'

jobs:
  ci-build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      test_results: ${{ steps.tests.outputs.test_status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          java_version: ${{ env.JAVA_VERSION }}

      - name: Determine Release Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
          else
            RAW_TAG="${{ github.ref_name }}"
          fi
          VERSION="${RAW_TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: Maven Build
        id: build
        uses: ./.github/actions/maven-build
        with:
          skip_tests: true # Since we run tests in a separate step, we can skip them here to save time
          timeout_minutes: '30'

      - name: Run Tests
        id: tests
        if: ${{ !inputs.skip_tests }}
        uses: ./.github/actions/run-tests
        with:
          timeout_minutes: '35'
          report_name: 'release-test-reports'

      - name: Create Release Notes
        id: release-notes
        uses: ./.github/actions/create-release-notes
        with:
          version: ${{ steps.version.outputs.version }}
          java_version: ${{ env.JAVA_VERSION }}
          output_file: 'release_notes.md'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Browser4 ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-rc.') || contains(steps.version.outputs.tag, '-alpha') || contains(steps.version.outputs.tag, '-beta') }}
      - name: Update Documentation
        id: update-docs
        uses: ./.github/actions/update-docs
        with:
          version: ${{ steps.version.outputs.version }}
          push_changes: 'true'

  deploy:
    runs-on: ubuntu-latest
    needs: ci-build
    if: needs.ci-build.result == 'success'
    permissions:
      contents: read
    env:
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release secrets
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          echo "=== Release secret preflight ==="
          missing=0

          if [ -z "${CENTRAL_USERNAME:-}" ]; then
            echo "::error::Missing required secret: CENTRAL_USERNAME"
            missing=1
          else
            echo "CENTRAL_USERNAME: configured"
          fi

          if [ -z "${CENTRAL_PASSWORD:-}" ]; then
            echo "::error::Missing required secret: CENTRAL_PASSWORD"
            missing=1
          else
            echo "CENTRAL_PASSWORD: configured"
          fi

          if [ -z "${GPG_PASSPHRASE:-}" ]; then
            echo "::error::Missing required secret: GPG_PASSPHRASE"
            missing=1
          else
            echo "GPG_PASSPHRASE: configured"
          fi

          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing required secret: GPG_PRIVATE_KEY"
            missing=1
          else
            echo "GPG_PRIVATE_KEY: configured"
            if ! printf '%s' "$GPG_PRIVATE_KEY" | grep -q "BEGIN PGP PRIVATE KEY BLOCK"; then
              echo "::error::GPG_PRIVATE_KEY does not look like an ASCII-armored private key block"
              missing=1
            fi
          fi

          if [ "$missing" -ne 0 ]; then
            echo "::error::Release preflight failed. Configure the missing or invalid secrets and retry."
            exit 1
          fi

      - name: Set up JDK ${{ env.JAVA_VERSION }} for Deployment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          server-id: 'central'
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Prepare Maven Wrapper
        shell: bash
        run: chmod +x ./mvnw

      - name: Deploy to Sonatype Central
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Deploying to Maven Central ==="
          ./mvnw --batch-mode --no-transfer-progress deploy -P deploy,release -DskipTests \
            -Dgpg.batch=true \
            -Dgpg.pinentry-mode=loopback \
            --show-version --errors

  release-summary:
    runs-on: ubuntu-latest
    needs:
      - ci-build
      - deploy
    if: always()
    permissions: {}

    steps:
      - name: Release Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.ci-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Results | ${{ needs.ci-build.outputs.test_results || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.ci-build.outputs.version || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
