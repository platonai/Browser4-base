# Prometheus Alerting Rules for pulsar-agentic

groups:
  - name: pulsar_agentic_alerts
    interval: 30s
    rules:
      # =====================================================
      # Agent Health Alerts
      # =====================================================
      
      - alert: HighAgentFailureRate
        expr: |
          rate(agent_failed_total[5m]) / rate(agent_started_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: agent
        annotations:
          summary: "High agent failure rate detected"
          description: "Agent failure rate is {{ $value | humanizePercentage }} (threshold: 10%)"
      
      - alert: AgentExecutionTimeout
        expr: |
          rate(agent_timeouts_total{operation="resolve"}[5m]) > 0.5
        for: 3m
        labels:
          severity: critical
          component: agent
        annotations:
          summary: "Frequent agent execution timeouts"
          description: "Agent resolve operations are timing out at {{ $value }} per second"
      
      - alert: TooManyActiveAgents
        expr: |
          agent_active_count > 100
        for: 10m
        labels:
          severity: warning
          component: agent
        annotations:
          summary: "Too many active agents"
          description: "There are {{ $value }} active agents (threshold: 100)"
      
      - alert: HighAgentRetryRate
        expr: |
          rate(agent_retries_total[5m]) > 1.0
        for: 5m
        labels:
          severity: warning
          component: agent
        annotations:
          summary: "High agent retry rate"
          description: "Agent operations are retrying at {{ $value }} per second"
      
      # =====================================================
      # Tool Execution Alerts
      # =====================================================
      
      - alert: HighToolCallFailureRate
        expr: |
          rate(tool_calls_failure_total[5m]) / rate(tool_calls_total[5m]) > 0.15
        for: 5m
        labels:
          severity: warning
          component: tool
        annotations:
          summary: "High tool call failure rate"
          description: "Tool call failure rate is {{ $value | humanizePercentage }} (threshold: 15%)"
      
      - alert: SlowToolExecution
        expr: |
          histogram_quantile(0.95, rate(tool_execution_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
          component: tool
        annotations:
          summary: "Slow tool execution detected"
          description: "95th percentile tool execution time is {{ $value | humanizeDuration }} (threshold: 30s)"
      
      - alert: HighToolValidationFailureRate
        expr: |
          rate(tool_validation_failures_total[5m]) > 0.5
        for: 3m
        labels:
          severity: warning
          component: tool
        annotations:
          summary: "High tool validation failure rate"
          description: "Tool validation failures at {{ $value }} per second"
      
      # =====================================================
      # LLM Inference Alerts
      # =====================================================
      
      - alert: HighInferenceFailureRate
        expr: |
          rate(inference_calls_failure_total[5m]) / rate(inference_calls_total[5m]) > 0.2
        for: 5m
        labels:
          severity: critical
          component: inference
        annotations:
          summary: "High LLM inference failure rate"
          description: "Inference failure rate is {{ $value | humanizePercentage }} (threshold: 20%)"
      
      - alert: SlowInferenceResponse
        expr: |
          histogram_quantile(0.90, rate(inference_duration_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "Slow LLM inference response"
          description: "90th percentile inference time is {{ $value | humanizeDuration }} (threshold: 60s)"
      
      - alert: CircuitBreakerTripped
        expr: |
          increase(inference_circuit_breaker_trips_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          component: inference
        annotations:
          summary: "Inference circuit breaker tripped"
          description: "Circuit breaker has tripped {{ $value }} times in the last 5 minutes"
      
      - alert: HighInferenceRetryRate
        expr: |
          rate(inference_retries_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "High inference retry rate"
          description: "Inference operations are retrying at {{ $value }} per second"
      
      - alert: ExcessiveTokenUsage
        expr: |
          rate(inference_tokens_input_total[1h]) > 1000000
        for: 10m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "Excessive token usage detected"
          description: "Token usage rate is {{ $value }} tokens per second (hourly rate)"
      
      # =====================================================
      # System Resource Alerts
      # =====================================================
      
      - alert: HighMemoryUsage
        expr: |
          jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.9
        for: 5m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "High JVM heap memory usage"
          description: "Heap memory usage is {{ $value | humanizePercentage }} (threshold: 90%)"
      
      - alert: HighGCPressure
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m]) / rate(jvm_gc_pause_seconds_count[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High GC pressure detected"
          description: "Average GC pause time is {{ $value | humanizeDuration }}"
      
      - alert: ThreadPoolExhaustion
        expr: |
          jvm_threads_live_threads > 500
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High thread count detected"
          description: "Thread count is {{ $value }} (threshold: 500)"
